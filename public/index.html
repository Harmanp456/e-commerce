<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Catalog</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#f1f5f9;
font-family:system-ui;
}

.card{
background:white;
border-radius:12px;
padding:28px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.cards-row{
display:flex;
gap:24px;
align-items:stretch;
}

.cards-row .card{
flex:1 1 0;
}

.form-row{
display:flex;
flex-direction:column;
gap:10px;
align-items:flex-start;
}

.input-box{
border:1px solid #cbd5e1;
border-radius:8px;
padding:8px 10px;
font-size:14px;
width:100%;
max-width:320px;
}

.cat-name{ width:210px; }
.cat-desc{ width:210px; }
.prod-name{ width:210px; }
.prod-price{ width:120px; }
.prod-cat{ width:160px; }

.btn{
background:#334155;
color:white;
padding:10px 18px;
border-radius:8px;
font-weight:600;
}

.btn:hover{
background:#1e293b;
}

.btn-primary{
background:#0f172a;
}

.btn-primary:hover{
background:black;
}

.btn-inline{
width:auto;
white-space:nowrap;
}

@media (max-width:900px){
  .cards-row{ flex-direction:column; }
}

#output{
background:#020617;
color:#e2e8f0;
border-radius:10px;
padding:18px;
font-family:monospace;
font-size:14px;
}

</style>

</head>

<body>

<div class="max-w-4xl mx-auto py-12 px-6">

<h1 class="text-4xl font-bold mb-10 text-slate-900">
Admin Catalog Dashboard
</h1>

<div class="cards-row">

<div class="card">

<h2 class="text-xl font-semibold mb-4">
Add Category
</h2>

<div class="form-row">

<input
id="cat-name"
type="text"
placeholder="Category Name"
class="input-box cat-name"
/>

<input
id="cat-desc"
type="text"
placeholder="Description"
class="input-box cat-desc"
/>

<button id="btn-add-cat" class="btn-primary btn btn-inline">
Add Category
</button>

</div>

</div>

<div class="card">

<h2 class="text-xl font-semibold mb-4">
Add Product
</h2>

<div class="form-row">

<input
id="prod-name"
type="text"
placeholder="Product Name"
class="input-box prod-name"
/>

<input
id="prod-price"
type="number"
placeholder="Price"
class="input-box prod-price"
/>

<input
id="prod-category"
type="number"
placeholder="Category ID"
class="input-box prod-cat"
/>

<button id="btn-add-prod" class="btn-primary btn btn-inline">
Add Product
</button>

</div>

</div>

</div>

<div class="flex gap-4 mt-8">

<button id="btn-list-cats" class="btn">
List Categories
</button>

<button id="btn-list-prods" class="btn">
List Products
</button>

<button id="btn-clear" class="btn">
Clear Panel
</button>

</div>

<div class="mt-8">

<h2 class="font-semibold mb-2">
API Response
</h2>

<pre id="output">
{
  "status":"ready"
}
</pre>

</div>

</div>

<script src="/js/admin.js"></script>

</body>
</html>
